<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Safari</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #fef9e7 0%, #fdebd0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 32px 28px 28px;
            text-align: center;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #5d4037;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            font-size: 0.95rem;
            color: #8d6e63;
            margin-top: 2px;
        }

        .characters {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .char-btn {
            width: 180px;
            padding: 20px 12px 16px;
            border: 3px solid #e0d5c1;
            border-radius: 22px;
            background: #faf6f0;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .char-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
        }

        .char-btn.active {
            border-color: #ffb74d;
            box-shadow: 0 0 0 4px rgba(255, 183, 77, 0.25);
            opacity: 1;
            pointer-events: auto;
        }

        .char-btn.correct-flash {
            border-color: #66bb6a;
            background: #e8f5e9;
            box-shadow: 0 0 0 8px rgba(102, 187, 106, 0.3);
        }

        .char-btn.incorrect-flash {
            border-color: #ef5350;
            background: #ffebee;
            box-shadow: 0 0 0 8px rgba(239, 83, 80, 0.25);
        }

        .char-btn img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            display: block;
            margin: 0 auto 10px;
            pointer-events: none;
        }

        .char-btn .char-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4e342e;
            pointer-events: none;
        }

        .char-btn .char-sound {
            font-size: 0.85rem;
            color: #8d6e63;
            pointer-events: none;
        }

        .listen-wrap {
            margin-bottom: 22px;
        }

        .listen-btn {
            font-size: 1.25rem;
            font-weight: 600;
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            background: #ff9800;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(255, 152, 0, 0.35);
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .listen-btn:hover {
            background: #f57c00;
            box-shadow: 0 6px 18px rgba(255, 152, 0, 0.4);
        }

        .listen-btn:active {
            transform: scale(0.96);
        }

        .listen-btn:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
            box-shadow: none;
        }

        .listen-btn.pulse {
            animation: pulse-glow 1.8s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 4px 14px rgba(255, 152, 0, 0.35); }
            50% { box-shadow: 0 4px 24px rgba(255, 152, 0, 0.6); }
        }

        .feedback {
            height: 32px;
            line-height: 32px;
            font-size: 1rem;
            font-weight: 600;
            color: #5d4037;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }

        .feedback.correct { color: #2e7d32; }
        .feedback.incorrect { color: #c62828; }

        .stars-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .star {
            font-size: 2rem;
            color: #e0e0e0;
            transition: color 0.3s, transform 0.3s;
        }

        .star.earned {
            color: #ffc107;
            transform: scale(1.15);
        }

        .round-info {
            font-size: 0.9rem;
            color: #9e9e9e;
            margin-bottom: 16px;
        }

        .reset-btn {
            font-size: 0.85rem;
            padding: 8px 20px;
            border: 1.5px solid #d7ccc8;
            border-radius: 20px;
            background: transparent;
            color: #8d6e63;
            cursor: pointer;
            transition: background 0.2s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .reset-btn:hover {
            background: #f5f0eb;
        }

        .completion {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .completion.show {
            display: flex;
        }

        .completion-card {
            background: #fff;
            border-radius: 24px;
            padding: 36px 28px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .completion-card h2 {
            font-size: 1.8rem;
            color: #5d4037;
            margin-bottom: 10px;
        }

        .completion-card .big-score {
            font-size: 3rem;
            font-weight: 700;
            color: #ff9800;
            margin-bottom: 6px;
        }

        .completion-card p {
            color: #8d6e63;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        .completion-card button {
            font-size: 1rem;
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            background: #ff9800;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            outline: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 14px 18px;
                border-radius: 20px;
            }

            .characters {
                gap: 12px;
            }

            .char-btn {
                width: 140px;
                padding: 14px 8px 12px;
                border-radius: 18px;
            }

            .char-btn img {
                width: 70px;
                height: 70px;
            }

            .header h1 {
                font-size: 1.7rem;
            }

            .listen-btn {
                font-size: 1.1rem;
                padding: 12px 32px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Sound Safari</h1>
        <div class="subtitle">Listen. Feel. Choose.</div>
    </div>

    <div class="characters">
        <button class="char-btn" id="kenBtn" disabled>
            <img src="images/ken.PNG" alt="Ken the Calico Cat">
            <div class="char-name">Ken</div>
            <div class="char-sound">/k/ sound</div>
        </button>

        <button class="char-btn" id="tillyBtn" disabled>
            <img src="images/tilly.PNG" alt="Tilly the Teal Turtle">
            <div class="char-name">Tilly</div>
            <div class="char-sound">/t/ sound</div>
        </button>
    </div>

    <div class="listen-wrap">
        <button class="listen-btn pulse" id="listenBtn">🔊 Listen</button>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="stars-row" id="starsRow"></div>

    <div class="round-info" id="roundInfo">Round 1 of 10</div>

    <button class="reset-btn" id="resetBtn">Start Over</button>
</div>

<div class="completion" id="completionOverlay">
    <div class="completion-card">
        <h2>Great work!</h2>
        <div class="big-score" id="finalScore">0/10</div>
        <p>You helped Ken and Tilly find their words.</p>
        <button id="playAgainBtn">Play Again</button>
    </div>
</div>

<script>
(function() {
    const pairs = [
        { k: { word: 'cat',    file: 'audio/cat.mp3'  }, t: { word: 'tap',  file: 'audio/tap.mp3'  } },
        { k: { word: 'key',    file: 'audio/key.mp3'  }, t: { word: 'tea',  file: 'audio/tea.mp3'  } },
        { k: { word: 'cape',   file: 'audio/cape.mp3' }, t: { word: 'tape', file: 'audio/tape.mp3' } },
        { k: { word: 'cool',   file: 'audio/cool.mp3' }, t: { word: 'tool', file: 'audio/tool.mp3' } },
        { k: { word: 'came',   file: 'audio/came.mp3' }, t: { word: 'tame', file: 'audio/tame.mp3' } },
        { k: { word: 'con',    file: 'audio/con.mp3'  }, t: { word: 'top',  file: 'audio/top.mp3'  } },
        { k: { word: 'can',    file: 'audio/can.mp3'  }, t: { word: 'tan',  file: 'audio/tan.mp3'  } },
        { k: { word: 'coat',   file: 'audio/coat.mp3' }, t: { word: 'tote', file: 'audio/tote.mp3' } },
        { k: { word: 'call',   file: 'audio/call.mp3' }, t: { word: 'tall', file: 'audio/tall.mp3' } },
        { k: { word: 'kick',   file: 'audio/kick.mp3' }, t: { word: 'tick', file: 'audio/tick.mp3' } }
    ];

    const kenBtn      = document.getElementById('kenBtn');
    const tillyBtn    = document.getElementById('tillyBtn');
    const listenBtn   = document.getElementById('listenBtn');
    const feedback    = document.getElementById('feedback');
    const starsRow    = document.getElementById('starsRow');
    const roundInfo   = document.getElementById('roundInfo');
    const resetBtn    = document.getElementById('resetBtn');
    const overlay     = document.getElementById('completionOverlay');
    const finalScore  = document.getElementById('finalScore');
    const playAgainBtn = document.getElementById('playAgainBtn');

    let shuffledPairs  = [];
    let roundIndex     = 0;
    let score          = 0;
    let currentTarget  = null;
    let currentAudio   = null;
    let firstAttempt   = true;
    let roundActive    = false;
    let gameOver       = false;

    function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function setFeedback(msg, cls) {
        feedback.textContent = msg;
        feedback.className = 'feedback ' + (cls || '');
    }

    function clearFeedback() {
        feedback.textContent = '';
        feedback.className = 'feedback';
    }

    function setCharactersEnabled(enabled) {
        if (enabled) {
            kenBtn.classList.add('active');
            tillyBtn.classList.add('active');
            kenBtn.disabled = false;
            tillyBtn.disabled = false;
        } else {
            kenBtn.classList.remove('active', 'correct-flash', 'incorrect-flash');
            tillyBtn.classList.remove('active', 'correct-flash', 'incorrect-flash');
            kenBtn.disabled = true;
            tillyBtn.disabled = true;
        }
    }

    function flashCharacter(btn, type) {
        btn.classList.add(type === 'correct' ? 'correct-flash' : 'incorrect-flash');
        setTimeout(function() {
            btn.classList.remove('correct-flash', 'incorrect-flash');
        }, 600);
    }

    function bounceCharacter(btn) {
        btn.style.transition = 'transform 0.15s';
        btn.style.transform = 'scale(1.08)';
        setTimeout(function() { btn.style.transform = 'scale(1)'; }, 180);
    }

    function shakeCharacter(btn) {
        btn.style.transition = 'transform 0.08s';
        btn.style.transform = 'translateX(-6px)';
        setTimeout(function() { btn.style.transform = 'translateX(6px)'; }, 80);
        setTimeout(function() { btn.style.transform = 'translateX(-4px)'; }, 160);
        setTimeout(function() { btn.style.transform = 'translateX(4px)'; }, 240);
        setTimeout(function() { btn.style.transform = 'translateX(0)'; }, 320);
    }

    function buildStars() {
        starsRow.innerHTML = '';
        for (var i = 0; i < 10; i++) {
            var span = document.createElement('span');
            span.className = 'star';
            span.textContent = '★';
            span.dataset.index = i;
            starsRow.appendChild(span);
        }
    }

    function fillStar(index) {
        var stars = starsRow.querySelectorAll('.star');
        if (stars[index]) {
            stars[index].classList.add('earned');
        }
    }

    function updateRoundDisplay() {
        var displayRound = Math.min(roundIndex + 1, 10);
        roundInfo.textContent = 'Round ' + displayRound + ' of 10';
    }

    function playCurrentWord() {
        if (!currentAudio) return;
        currentAudio.currentTime = 0;
        currentAudio.play().catch(function() {});
    }

    function startRound() {
        if (gameOver) return;

        if (roundIndex >= 10) {
            endGame();
            return;
        }

        var pair = shuffledPairs[roundIndex];
        currentTarget = Math.random() < 0.5 ? 'k' : 't';
        currentAudio = new Audio(pair[currentTarget].file);
        firstAttempt = true;
        roundActive = false;

        setCharactersEnabled(false);
        clearFeedback();
        listenBtn.disabled = false;
        listenBtn.classList.add('pulse');
        listenBtn.textContent = '🔊 Listen';
        updateRoundDisplay();
    }

    function onListenClick() {
        if (gameOver) return;
        if (roundActive) {
            playCurrentWord();
            return;
        }

        listenBtn.classList.remove('pulse');
        listenBtn.textContent = '🔊 Replay';
        playCurrentWord();

        setTimeout(function() {
            roundActive = true;
            setCharactersEnabled(true);
            setFeedback('Whose word is it?', '');
        }, 400);
    }

    function onCharacterClick(targetChar) {
        if (!roundActive || gameOver) return;

        var btn = targetChar === 'k' ? kenBtn : tillyBtn;
        var isCorrect = (targetChar === currentTarget);

        if (isCorrect) {
            roundActive = false;
            setCharactersEnabled(false);
            flashCharacter(btn, 'correct');
            bounceCharacter(btn);

            if (firstAttempt) {
                score++;
                fillStar(roundIndex);
            }

            setFeedback('Yes! That is a /' + currentTarget + '/ word.', 'correct');
            roundIndex++;

            setTimeout(function() {
                startRound();
            }, 1800);

        } else {
            firstAttempt = false;
            flashCharacter(btn, 'incorrect');
            shakeCharacter(btn);
            setFeedback('Not quite. Listen again.', 'incorrect');

            setTimeout(function() {
                playCurrentWord();
            }, 1200);
        }
    }

    function endGame() {
        gameOver = true;
        roundActive = false;
        setCharactersEnabled(false);
        listenBtn.disabled = true;
        listenBtn.classList.remove('pulse');
        listenBtn.textContent = '🔊 Listen';
        clearFeedback();
        roundInfo.textContent = 'All done!';
        finalScore.textContent = score + ' / 10';
        overlay.classList.add('show');
    }

    function resetGame() {
        gameOver = false;
        roundIndex = 0;
        score = 0;
        currentTarget = null;
        currentAudio = null;
        firstAttempt = true;
        roundActive = false;

        shuffledPairs = shuffle(pairs);
        buildStars();

        setCharactersEnabled(false);
        listenBtn.disabled = false;
        listenBtn.classList.add('pulse');
        listenBtn.textContent = '🔊 Listen';
        clearFeedback();
        overlay.classList.remove('show');
        updateRoundDisplay();

        startRound();
    }

    listenBtn.addEventListener('click', onListenClick);
    kenBtn.addEventListener('click', function() { onCharacterClick('k'); });
    tillyBtn.addEventListener('click', function() { onCharacterClick('t'); });
    resetBtn.addEventListener('click', resetGame);
    playAgainBtn.addEventListener('click', resetGame);

    resetGame();
})();
</script>
</body>
</html>
